<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manifest Quiz - ManiFan</title>
<style>
body {
    font-family: 'Arial', sans-serif;
    background-image: url('arkaplan.jpg');
    background-size: cover;
    background-position: center;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#quiz-container {
    background-color: rgba(255,255,255,0.95);
    padding:30px 40px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    width:90%;
    max-width:500px;
    text-align:center;
    position:relative;
}

h2 { margin-bottom:20px; }
.option-btn {
    display:block;
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background-color:#4CAF50;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}
.option-btn:hover { transform:scale(1.05); }
.option-btn.correct { background-color:#4CAF50; animation: flash 0.5s; }
.option-btn.wrong { background-color:#f44336; animation: shake 0.5s; }

#score-bar {
    font-size:18px;
    margin-bottom:10px;
    font-weight:bold;
}
#question-number { position:absolute; top:10px; right:20px; font-weight:bold; }
#result { font-size:20px; margin-top:20px; display:none; font-weight:bold; }

@keyframes shake {
  0% { transform: translateX(0px); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0px); }
}
@keyframes flash {
  0% { opacity:0.5; }
  50% { opacity:1; }
  100% { opacity:1; }
}
</style>
</head>
<body>

<div id="quiz-container">
  <div id="question-number">Soru 1 / 7</div>
  <div id="score-bar">Puan: 0</div>
  <h2 id="question">Soru Yükleniyor...</h2>
  <button class="option-btn" id="a">Seçenek A</button>
  <button class="option-btn" id="b">Seçenek B</button>
  <div id="result"></div>
</div>

<script>
let sorular = [
    {soru: "Manifest grubu kaç kişiden oluşur?", a: "5", b: "6", dogru: "b"},
    {soru: "Manifest hangi yıl kuruldu?", a: "2025", b: "2020", dogru: "a"},
    {soru: "Manifest grubunun ilk şarkısı hangisidir?", a: "Zamansızdık", b: "Snap", dogru: "a"},
    {soru: "Manifest hangi yarışma ile kuruldu?", a: "O Ses Türkiye", b: "Big5 Türkiye", dogru: "b"},
    {soru: "Aşağıdakilerden hangisi Manifest üyesidir?", a: "Mina Solak", b: "Hadise", dogru: "a"},
    {soru: "Manifest grubunun tarzı nedir?", a: "Pop / R&B", b: "Rock / Metal", dogru: "a"},
    {soru: "Manifest’in ilk albümünün adı nedir?", a: "Manifestival", b: "Dreamland", dogru: "a"}
];

let currentQuestion = 0;
let score = 0;

const questionEl = document.getElementById("question");
const aBtn = document.getElementById("a");
const bBtn = document.getElementById("b");
const scoreBar = document.getElementById("score-bar");
const questionNumber = document.getElementById("question-number");
const resultEl = document.getElementById("result");

function loadQuestion() {
    let q = sorular[currentQuestion];
    questionEl.textContent = q.soru;
    aBtn.textContent = "A: " + q.a;
    bBtn.textContent = "B: " + q.b;

    aBtn.className = "option-btn";
    bBtn.className = "option-btn";

    aBtn.disabled = false;
    bBtn.disabled = false;

    questionNumber.textContent = `Soru ${currentQuestion + 1} / ${sorular.length}`;
}

function checkAnswer(selectedBtn, selectedKey) {
    let correctKey = sorular[currentQuestion].dogru;
    aBtn.disabled = true;
    bBtn.disabled = true;

    if(selectedKey === correctKey){
        selectedBtn.classList.add("correct");
        score++;
        scoreBar.textContent = `Puan: ${score}`;
    } else {
        selectedBtn.classList.add("wrong");
        if(correctKey==="a") aBtn.classList.add("correct");
        else bBtn.classList.add("correct");
    }

    setTimeout(() => {
        currentQuestion++;
        if(currentQuestion < sorular.length) loadQuestion();
        else showResult();
    }, 1000);
}

function showResult(){
    questionEl.style.display="none";
    aBtn.style.display="none";
    bBtn.style.display="none";
    questionNumber.style.display="none";
    let maniFan = "";
    if(score===7) maniFan = "100V ManiFan 🌟";
    else if(score>=5) maniFan = "80V ManiFan ✨";
    else if(score>=3) maniFan = "50V ManiFan ⚡";
    else maniFan = "Başlangıç ManiFan 🔹";

    resultEl.style.display="block";
    resultEl.innerHTML = `Quiz bitti!<br>Toplam Puan: ${score}/${sorular.length}<br>Senin ManiFan Seviyen: <b>${maniFan}</b>`;
}

aBtn.addEventListener("click", ()=>checkAnswer(aBtn,"a"));
bBtn.addEventListener("click", ()=>checkAnswer(bBtn,"b"));

loadQuestion();
</script>

</body>
</html>
