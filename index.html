<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manifest Quiz - ManiFan Max</title>
<style>
body {
  font-family: 'Arial', sans-serif;
  background-image: url('arkaplan.jpg');
  background-size: cover;
  background-position: center;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
#quiz-container {
  background: rgba(255,255,255,0.95);
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  width: 90%;
  max-width: 600px;
  text-align: center;
  position: relative;
}
h2 { margin-bottom: 15px; }
.option-btn {
  display: block;
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  background-color: #4CAF50;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: .3s;
}
.option-btn:hover { transform: scale(1.05); }
.option-btn.correct { background-color: #4CAF50; }
.option-btn.wrong { background-color: #f44336; }
#score-bar, #timer { font-size: 18px; margin-bottom: 12px; font-weight: bold; }
#question-number { position:absolute; top:12px; right:18px; font-weight:bold; }
#result { font-size:22px; margin-top:20px; display:none; font-weight:bold; }
</style>
</head>
<body>

<div id="quiz-container">
  <div id="question-number"></div>
  <div id="timer">⏱️ Süre: <span id="time">10</span>s</div>
  <div id="score-bar">Puan: 0</div>
  <h2 id="question">Yükleniyor...</h2>
  <button class="option-btn" id="a"></button>
  <button class="option-btn" id="b"></button>
  <div id="result"></div>
</div>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>
// Sorular
let sorular = [
{ soru:"Manifest grubu kaç kişiden oluşur?", a:"5", b:"6", dogru:"b"},
{ soru:"Manifest hangi yarışma ile kuruldu?", a:"O Ses Türkiye", b:"Big5 Türkiye", dogru:"b"},
{ soru:"Manifest’in ilk single’ı hangisidir?", a:"Zamansızdık", b:"Snap", dogru:"a"},
{ soru:"Manifest’in ilk albümünün adı nedir?", a:"Dreamland", b:"Manifestival", dogru:"b"},
{ soru:"Manifest çıkışını hangi yıl yaptı?", a:"2025", b:"2020", dogru:"a"},
{ soru:"Aşağıdakilerden hangisi grup üyesidir?", a:"Zeynep Sude Oktay", b:"Hadise", dogru:"b"},
{ soru:"Hayran kitlesine ne denir?", a:"maniFAM", b:"maniFANS", dogru:"a"},
{ soru:"Manifest’in yayınladığı bir single nedir?", a:"Arıyo", b:"Hej", dogru:"a"},
{ soru:"Manifest’in türü nedir?", a:"Pop / R&B", b:"Rock", dogru:"a"},
{ soru:"Manifest’in ilk konseri hangi şehirdeydi?", a:"İstanbul", b:"Ankara", dogru:"a"},
{ soru:"Manifest’in menajeri kimdir?", a:"Mustafa K.", b:"Ali V.", dogru:"a"},
{ soru:"Manifest’in resmi fan kulübü adı?", a:"ManiClub", b:"ManiFans", dogru:"b"},
{ soru:"Manifest’in albüm kapağı rengi hangisi?", a:"Siyah", b:"Beyaz", dogru:"a"},
{ soru:"Manifest’in kuruluş şehri?", a:"İzmir", b:"İstanbul", dogru:"b"},
{ soru:"Manifest’in popüler şarkısı hangisi?", a:"Zamansızdık", b:"Snap", dogru:"a"},
{ soru:"Manifest ilk ödülünü ne zaman aldı?", a:"2026", b:"2027", dogru:"a"},
{ soru:"Manifest’in vokalisti kimdir?", a:"Zeynep", b:"Mina", dogru:"b"},
{ soru:"Manifest’in dansçısı var mı?", a:"Evet", b:"Hayır", dogru:"a"},
{ soru:"Manifest’in bir mini albümü var mı?", a:"Evet", b:"Hayır", dogru:"b"},
{ soru:"Manifest’in klip yönetmeni kimdir?", a:"Serkan", b:"Burak", dogru:"a"}
];

let currentQuestion=0, score=0, timeLeft=10, timerInterval;

const qNum = document.getElementById("question-number");
const timerDisplay = document.getElementById("time");
const questionEl = document.getElementById("question");
const aBtn = document.getElementById("a");
const bBtn = document.getElementById("b");
const scoreBar = document.getElementById("score-bar");
const resultEl = document.getElementById("result");
const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

function loadQuestion(){
  let q=sorular[currentQuestion];
  questionEl.textContent=q.soru;
  aBtn.textContent="A: "+q.a;
  bBtn.textContent="B: "+q.b;
  aBtn.className="option-btn";
  bBtn.className="option-btn";
  aBtn.disabled=false;
  bBtn.disabled=false;
  qNum.textContent=`Soru ${currentQuestion+1} / ${sorular.length}`;

  timeLeft=10;
  timerDisplay.textContent=timeLeft;
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--;
    timerDisplay.textContent=timeLeft;
    if(timeLeft<=0){ 
      clearInterval(timerInterval); 
      checkAnswer(null); 
    }
  },1000);
}

function checkAnswer(btn){
  clearInterval(timerInterval);
  aBtn.disabled=true; bBtn.disabled=true;
  let correct=sorular[currentQuestion].dogru;

  if(btn===correct){
    document.getElementById(btn).classList.add("correct");
    correctSound.play(); score++;
  } else {
    if(btn) document.getElementById(btn).classList.add("wrong");
    document.getElementById(correct).classList.add("correct");
    wrongSound.play();
  }

  scoreBar.textContent=`Puan: ${score}`;

  setTimeout(()=>{
    currentQuestion++;
    if(currentQuestion<sorular.length) loadQuestion();
    else showResult();
  },1200);
}

function showResult(){
  questionEl.style.display="none"; aBtn.style.display="none"; bBtn.style.display="none";
  qNum.style.display="none"; timerDisplay.parentElement.style.display="none";

  let lvl="";
  if(score>=18) lvl="⚡ Legend ManiFan";
  else if(score>=15) lvl="🔥 Hero ManiFan";
  else if(score>=12) lvl="🌟 Super ManiFan";
  else lvl="✨ ManiFan Starter";

  resultEl.style.display="block";
  resultEl.innerHTML=`🎉 Quiz Bitti!<br>Skor: ${score}/${sorular.length}<br>Senin Seviyen: <b>${lvl}</b>`;
}

aBtn.addEventListener("click",()=>checkAnswer("a"));
bBtn.addEventListener("click",()=>checkAnswer("b"));
loadQuestion();

</script>
</body>
</html>
