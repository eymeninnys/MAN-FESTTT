<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manifest Quiz - ManiFan Deluxe</title>
<style>
body {
    font-family: 'Arial', sans-serif;
    background-image: url('arkaplan.jpg');
    background-size: cover;
    background-position: center;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
#quiz-container {
    background-color: rgba(255,255,255,0.95);
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    width:90%;
    max-width:550px;
    text-align:center;
    position:relative;
}
h2 { margin-bottom:18px; }
.option-btn {
    display:block;
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background-color:#4CAF50;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}
.option-btn:hover { transform:scale(1.05); }
.option-btn.correct { background-color:#4CAF50; animation: flash 0.5s; }
.option-btn.wrong { background-color:#f44336; animation: shake 0.5s; }
#score-bar, #timer { font-size:18px; margin-bottom:12px; font-weight:bold; }
#question-number { position:absolute; top:12px; right:18px; font-weight:bold; }
#result { font-size:22px; margin-top:20px; display:none; font-weight:bold; }
@keyframes shake { 0%{transform:translateX(0);}25%{transform:translateX(-6px);}50%{transform:translateX(6px);}75%{transform:translateX(-6px);}100%{transform:translateX(0);} }
@keyframes flash { 0%{opacity:0.5;}50%{opacity:1;}100%{opacity:1;} }
</style>
</head>
<body>

<div id="quiz-container">
  <div id="question-number"></div>
  <div id="timer">⏱️ Süre: <span id="time">10</span>s</div>
  <div id="score-bar">Puan: 0</div>
  <h2 id="question">Yükleniyor...</h2>
  <button class="option-btn" id="a"></button>
  <button class="option-btn" id="b"></button>
  <div id="result"></div>
</div>

<script>
// Gelişmiş Manifest soruları
let sorular = [
  {soru:"Manifest grubu kaç kişiden oluşur?", a:"5", b:"6", dogru:"b"},
  {soru:"Manifest hangi yarışma ile kuruldu?", a:"O Ses Türkiye", b:"Big5 Türkiye", dogru:"b"},
  {soru:"Manifest’in ilk single’ı hangisidir?", a:"Zamansızdık", b:"Snap", dogru:"a"},
  {soru:"Manifest’in ilk albümünün adı nedir?", a:"Dreamland", b:"Manifestival", dogru:"b"},
  {soru:"Manifest çıkışını hangi yıl yaptı?", a:"2025", b:"2020", dogru:"a"},
  {soru:"Aşağıdakilerden hangisi üye değildir?", a:"Zeynep Sude Oktay", b:"Hadise", dogru:"a"},
  {soru:"Manifest hayran kitlesine ne denir?", a:"maniFAM", b:"maniFANS", dogru:"a"},
  {soru:"Manifest’in iki single’ıdan biri hangisidir?", a:"Arıyo", b:"Hej", dogru:"a"},
  {soru:"Manifest grup türü nedir?", a:"Pop / R&B", b:"Rock", dogru:"a"},
  {soru:"Manifest’in çıkış konserini nerede yaptı?", a:"Jolly Joker Arena", b:"Zorlu PSM", dogru:"a"}
];

let currentQuestion=0,score=0,timeLeft=10, timerInterval;

const qNum = document.getElementById("question-number");
const timerDisplay = document.getElementById("time");
const questionEl = document.getElementById("question");
const aBtn = document.getElementById("a");
const bBtn = document.getElementById("b");
const scoreBar = document.getElementById("score-bar");
const resultEl = document.getElementById("result");

function loadQuestion(){
  let q=sorular[currentQuestion];
  questionEl.textContent=q.soru;
  aBtn.textContent="A: "+q.a;
  bBtn.textContent="B: "+q.b;
  aBtn.className="option-btn";
  bBtn.className="option-btn";
  aBtn.disabled=false;
  bBtn.disabled=false;
  qNum.textContent=`Soru ${currentQuestion+1} / ${sorular.length}`;

  timeLeft=10;
  timerDisplay.textContent=timeLeft;
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--;
    timerDisplay.textContent=timeLeft;
    if(timeLeft<=0){
      clearInterval(timerInterval);
      checkAnswer(null);
    }
  },1000);
}

function checkAnswer(selectedBtn){
  clearInterval(timerInterval);
  let correct=sorular[currentQuestion].dogru;
  aBtn.disabled=true;
  bBtn.disabled=true;

  if(selectedBtn && selectedBtn==correct){
    if(selectedBtn=="a") aBtn.classList.add("correct");
    else bBtn.classList.add("correct");
    score++;
  } else {
    if(selectedBtn){
      if(selectedBtn=="a") aBtn.classList.add("wrong");
      else bBtn.classList.add("wrong");
    }
    if(correct=="a") aBtn.classList.add("correct");
    else bBtn.classList.add("correct");
  }
  scoreBar.textContent=`Puan: ${score}`;

  setTimeout(()=>{
    currentQuestion++;
    if(currentQuestion<sorular.length) loadQuestion();
    else showResult();
  },1500);
}

function showResult(){
  questionEl.style.display="none";
  aBtn.style.display="none";
  bBtn.style.display="none";
  qNum.style.display="none";
  timerDisplay.parentElement.style.display="none";

  let grade="";
  if(score>=9) grade="Elite ManiFan ⭐️";
  else if(score>=7) grade="Pro ManiFan 🌟";
  else if(score>=5) grade="ManiFan 👍";
  else grade="Yeni ManiFan 👶";

  resultEl.style.display="block";
  resultEl.innerHTML=`🎉 Quiz Bitti!<br>Puan: ${score}/${sorular.length}<br>Seviyen: <b>${grade}</b>`;
}

aBtn.addEventListener("click",()=>checkAnswer("a"));
bBtn.addEventListener("click",()=>checkAnswer("b"));

loadQuestion();
</script>

</body>
</html>
