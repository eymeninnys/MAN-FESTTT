<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Memory Pro</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #2c5364);
    font-family: Arial;
}

.container {
    text-align: center;
    color: white;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 110px);
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
}

.card {
    width: 110px;
    height: 110px;
    border-radius: 15px;
    cursor: pointer;
    perspective: 1000px;
}

.inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s;
}

.card.flipped .inner {
    transform: rotateY(180deg);
}

.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 15px;
    backface-visibility: hidden;
}

.front {
    background: #1e90ff;
}

.back {
    transform: rotateY(180deg);
    background-size: cover;
    background-position: center;
}
</style>
</head>
<body>

<div class="container">
    <h1>🧠 Memory Pro</h1>
    <div id="moves">Hamle: 0</div>

    <div class="grid" id="grid"></div>
</div>

<script>

// 🔥 BURAYA RESİMLERİ KOY
let images = [
    "img1.jpg",
    "img2.jpg",
    "img3.jpg",
    "img4.jpg",
    "img5.jpg",
    "img6.jpg"
];

// 2'şer kopya
let cardsArray = [...images, ...images];

// karıştır
cardsArray.sort(() => 0.5 - Math.random());

let first = null;
let second = null;
let lock = false;
let moves = 0;

const grid = document.getElementById("grid");

cardsArray.forEach(img => {
    let card = document.createElement("div");
    card.classList.add("card");

    card.innerHTML = `
        <div class="inner">
            <div class="front"></div>
            <div class="back" style="background-image:url('${img}')"></div>
        </div>
    `;

    card.onclick = () => flip(card, img);

    grid.appendChild(card);
});

function flip(card, img) {
    if(lock || card === first) return;

    card.classList.add("flipped");

    if(!first) {
        first = {card, img};
    } else {
        second = {card, img};
        moves++;
        document.getElementById("moves").innerText = "Hamle: " + moves;

        checkMatch();
    }
}

function checkMatch() {
    if(first.img === second.img) {
        first = null;
        second = null;
    } else {
        lock = true;
        setTimeout(() => {
            first.card.classList.remove("flipped");
            second.card.classList.remove("flipped");
            first = null;
            second = null;
            lock = false;
        }, 800);
    }
}

</script>

</body>
</html>
